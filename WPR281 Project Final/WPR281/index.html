<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Tracker - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>Bug Tracker</h1>
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <p class="hint">Admin credentials: username: <strong>admin</strong>, password: <strong>admin123</strong></p>
        </div>
    </div>

  
    <script>

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === 'admin123') {
                sessionStorage.setItem('userRole', 'admin');
                sessionStorage.setItem('username', username);
                window.location.href = 'admin.html';
            } else if (/^user\d{3}$/.test(username) && password.includes(username)) {
                // Username matches pattern "user" + 3 digits AND password contains username
                sessionStorage.setItem('username', username);
                window.location.href = 'report-bug.html';
            } else {
                alert('Invalid credentials. Please try again.');
            }
        });
    </script>
</body>
</html>
